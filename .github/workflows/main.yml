name: Build IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios cordova-res
          npx cap init "Mala Counter" "com.mala.counter" --web-dir www
          npx cap add ios

      - name: Generate Native Icons
        run: |
          # The robot uses your manual 'resources' folder to make all icon sizes
          npx cordova-res ios --skip-config --copy
          npx cap copy ios

      - name: Force Landscape Orientation
        run: |
          plutil -remove UISupportedInterfaceOrientations ios/App/App/Info.plist
          plutil -insert UISupportedInterfaceOrientations -xml "<array><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>" ios/App/App/Info.plist

      - name: Compile App (No Signing)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          
      - name: Package for TrollStore
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r MalaCounter.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MalaCounter-IPA
          path: MalaCounter.ipa
