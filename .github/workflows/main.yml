name: Build IPA and APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/android cordova-res
          npx cap init "Mala Counter" "com.mala.counter" --web-dir www
          npx cap add ios
          npx cap add android

      - name: Generate Native Icons
        run: |
          npx cordova-res ios --skip-config --copy --type icon
          npx cordova-res android --skip-config --copy --type icon
          npx cap copy

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Compile iOS
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r MalaCounter.ipa Payload
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mala-Counter-Builds
          path: |
            MalaCounter.ipa
            android/app/build/outputs/apk/debug/app-debug.apk
