name: Build IPA and APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/android
          npx cap init "Mala Counter" "com.mala.counter" --web-dir www
          npx cap add ios
          npx cap add android

      - name: Force Landscape (iOS)
        run: |
          plutil -remove UISupportedInterfaceOrientations ios/App/App/Info.plist
          plutil -insert UISupportedInterfaceOrientations -xml "<array><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>" ios/App/App/Info.plist

      - name: Force Landscape (Android)
        run: |
          sed -i '' 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="landscape"/g' android/app/src/main/AndroidManifest.xml

      - name: Copy Assets
        run: npx cap copy

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Compile iOS
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r MalaCounter.ipa Payload
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mala-Counter-Builds
          path: |
            MalaCounter.ipa
            android/app/build/outputs/apk/debug/app-debug.apk
