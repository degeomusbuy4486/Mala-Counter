name: Build IPA and APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
   
    
      - name: Inject Notification Brain
        run: |
          sed -i '' 's|</head>|<script>async function setDailyReminder(){const {LocalNotifications:n}=Capacitor.Plugins;await n.requestPermissions();await n.schedule({notifications:[{title:"Mala Counter",body:"Complete your daily mala!",id:12,schedule:{on:{hour:12,minute:0},repeats:true}}]});} async function celebrate(){const {LocalNotifications:n}=Capacitor.Plugins;await n.requestPermissions();await n.schedule({notifications:[{title:"Mala Complete!",body:"Congratulations on finishing a round!",id:1,schedule:{at:new Date(Date.now()+500)}}]});} window.setDailyReminder=setDailyReminder;window.celebrate=celebrate;</script></head>|' www/index.html

     
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/android @capacitor/local-notifications
          npx cap init "Mala Counter" "com.mala.counter" --web-dir www
          npx cap add ios
          npx cap add android
          npm install
          npm sync


      - name: Generate Native Icons
        run: |
          npx @capacitor/assets generate --ios --android
          npx cap copy

      - name: Force Landscape Configuration
        run: |
          # iOS: Force LandscapeRight (Notch on Left)
          # We convert to xml1 first to ensure plutil can edit it safely
          plutil -convert xml1 ios/App/App/Info.plist
          plutil -replace UISupportedInterfaceOrientations -xml "<array><string>UIInterfaceOrientationLandscapeRight</string></array>" ios/App/App/Info.plist
          plutil -replace UISupportedInterfaceOrientations~ipad -xml "<array><string>UIInterfaceOrientationLandscapeRight</string></array>" ios/App/App/Info.plist
          
          # Android: Force landscape
          sed -i '' 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="landscape"/g' android/app/src/main/AndroidManifest.xml

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Compile iOS
        run: |
          cd ios/App
          xcodebuild clean -workspace App.xcworkspace -scheme App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r MalaCounter.ipa Payload
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mala-Counter-Builds
          path: |
            MalaCounter.ipa
            android/app/build/outputs/apk/debug/app-debug.apk
